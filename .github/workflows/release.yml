name: Release binaries

# Push a version tag (e.g. `git tag v0.1.0 && git push --tags`) to build the
# native client + seed for Linux/Windows/macOS and attach them to a GitHub
# Release. A manual run just uploads build artifacts (no Release is created).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the Release and upload assets

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: windows-latest
            name: windows-x86_64
          - os: macos-latest
            name: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p ironvein -p ironvein-seed

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg="ironvein-${{ github.ref_name }}-${{ matrix.name }}"
          tar -czf "$pkg.tar.gz" -C target/release ironvein ironvein-seed
          echo "ASSET=$pkg.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "ironvein-${{ github.ref_name }}-${{ matrix.name }}"
          Compress-Archive -Path target/release/ironvein.exe, target/release/ironvein-seed.exe -DestinationPath "$pkg.zip"
          "ASSET=$pkg.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact (every run)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

      - name: Attach to the Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
